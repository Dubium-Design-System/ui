# Имя workflow (отображается в интерфейсе GitHub Actions)
name: Deploy Storybook

# Триггеры запуска workflow
on:
  push:
    branches:
      - main # Запускается при пуше в ветку main

# Определение задач (jobs)
jobs:
  deploy: # Задача развертывания
    runs-on: ubuntu-latest # Используем последнюю версию Ubuntu
    timeout-minutes: 15 # Максимальное время выполнения - 15 минут

    # Настройка прав доступа для GitHub Actions
    permissions:
      contents: write # Право на запись содержимого репозитория
      pages: write # Право на запись GitHub Pages
      id-token: write # Право на создание токена аутентификации

    # Принудительное использование Node.js 24 для всех JavaScript actions
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # Шаг 1: Клонирование репозитория
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Шаг 2: Установка Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          # Убираем cache, так как нет lock-файла в корне

      # Шаг 3: Установка зависимостей для Storybook (в папке docs)
      - name: Install dependencies
        working-directory: docs
        run: npm i --legacy-peer-deps --timeout=30000
        # npm ci использует package-lock.json, если его нет - падает на npm install

      # Шаг 4: Сборка Storybook
      - name: Build Storybook
        working-directory: docs
        run: npm run build
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"

      # Шаг 5: Проверка результата сборки
      - name: Verify build output
        working-directory: docs
        run: |
          ls -la storybook-static
          [ -f storybook-static/index.html ] || exit 1

      # Шаг 6: Деплой на GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/storybook-static
          destination_dir: ./
          keep_files: false
          force_orphan: true
